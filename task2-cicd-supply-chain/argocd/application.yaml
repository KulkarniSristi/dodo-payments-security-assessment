apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ledger-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/KulkarniSristi/dodo-payments-security-assessment.git
    targetRevision: main
    path: task1-harden-workload/deploy
  destination:
    server: https://kubernetes.default.svc
    namespace: payments
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
