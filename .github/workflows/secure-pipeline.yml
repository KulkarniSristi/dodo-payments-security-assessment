name: Secure CI/CD Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'task1-harden-workload/app/**'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write
  id-token: write        # required for Cosign keyless signing
  security-events: write # required to upload SARIF to Security tab

env:
  IMAGE_NAME: ghcr.io/kulkarnisristi/ledger-api
  APP_DIR: ./task1-harden-workload/app

jobs:
  secrets-scan:
    name: Gitleaks (secrets scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Fail policy: HARD BLOCK. Any leaked secret halts the pipeline immediately.

  sast:
    name: Semgrep (SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: p/python
        env:
          SEMGREP_RULES: p/python p/security-audit p/owasp-top-ten
        # Fail policy: HARD BLOCK on ERROR-severity findings; WARN on lower severity (see semgrep.yml config)
        continue-on-error: false

  dependency-scan:
    name: Trivy (dependency + CVE scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ${{ env.APP_DIR }}
          format: sarif
          output: trivy-fs-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 1
        # Fail policy: HARD BLOCK on CRITICAL/HIGH with a known fix.
        # CVEs with no available fix yet are logged but do not block (tracked via SARIF upload for visibility).
      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs-results.sarif

  build:
    name: Build, scan image, sign, push
    needs: [secrets-scan, sast, dependency-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag (git SHA, never :latest)
        run: echo "IMAGE_TAG=${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: docker build -t "${{ env.IMAGE_TAG }}" "${{ env.APP_DIR }}"

      - name: Scan built image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
        # Fail policy: HARD BLOCK on CRITICAL/HIGH with a known fix only.
        # Unfixed CVEs (residual OS-level findings in base image) are logged via SARIF but do not block.
          image-ref: ${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-image-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1

      - name: Upload image scan SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image-results.sarif

      - name: Push image
        run: docker push "${{ env.IMAGE_TAG }}"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless)
        run: cosign sign --yes "${{ env.IMAGE_TAG }}"

      - name: Generate SLSA provenance attestation
        run: |
          cosign attest --yes \
            --predicate <(echo '{"buildType":"github-actions","builder":{"id":"${{ github.workflow }}"},"invocation":{"configSource":{"uri":"${{ github.repository }}","digest":{"sha1":"${{ github.sha }}"}}}}') \
            --type slsaprovenance \
            "${{ env.IMAGE_TAG }}"
