apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-root-user
  annotations:
    policies.kyverno.io/title: Disallow Root User
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      Containers must not run as root. runAsNonRoot must be explicitly true,
      either at the pod level (inherited by all containers, e.g. Istio-injected
      sidecars) or explicitly per-container.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-run-as-non-root
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - argocd
                - kyverno
                - kube-system
                - ingress-nginx
                - istio-system
      validate:
        message: "Containers must set securityContext.runAsNonRoot=true, either at pod level or per-container (missing entirely is rejected)."
        anyPattern:
          - spec:
              securityContext:
                runAsNonRoot: true
          - spec:
              containers:
                - securityContext:
                    runAsNonRoot: true
